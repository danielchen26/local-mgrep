    <text x="0" y="68" fill="#A7F3D0" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" letter-spacing="2.8">FREE LOCAL SEMANTIC CODE SEARCH</text>
    <text x="0" y="114" fill="#CBD5E1" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22">Describe what you need. Retrieve the right code.</text>
    <text x="0" y="146" fill="#CBD5E1" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22">No account. No API bill. No source upload.</text>
    <g transform="translate(0 194)">
