    <rect x="0" y="0" width="456" height="48" rx="22" fill="#0B1120"/>
    <circle cx="28" cy="24" r="6" fill="#FB7185"/>
    <circle cx="50" cy="24" r="6" fill="#FBBF24"/>
    <circle cx="72" cy="24" r="6" fill="#34D399"/>
    <text x="104" y="30" fill="#94A3B8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">terminal</text>
    <text x="28" y="86" fill="#E2E8F0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">$ mgrep search <tspan fill="#67E8F9">"how are tokens refreshed?"</tspan></text>
    <text x="28" y="126" fill="#34D399" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">local_mgrep/src/cli.py:124-145</text>
    <text x="28" y="152" fill="#CBD5E1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">agentic query decomposition → merged results</text>
    <text x="28" y="194" fill="#34D399" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">local_mgrep/src/storage.py:197-271</text>
    <text x="28" y="220" fill="#CBD5E1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">semantic + lexical + diversified top-k</text>
    <rect x="28" y="254" width="166" height="32" rx="16" fill="#042F2E" stroke="#0F766E"/>
    <text x="48" y="275" fill="#99F6E4" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">100% local</text>
    <rect x="208" y="254" width="190" height="32" rx="16" fill="#172554" stroke="#2563EB"/>
    <text x="228" y="275" fill="#BFDBFE" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">agent-ready JSON</text>
