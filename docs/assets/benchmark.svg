<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">local-mgrep benchmark chart</title>
  <desc id="desc">Benchmark chart showing top-k 10 local-mgrep reached 30 out of 30 expected-file recall and 2.00x estimated total token reduction in a deterministic local context-gathering benchmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1120"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="560" rx="30" fill="url(#bg)"/>
  <text x="72" y="70" fill="#F8FAFC" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="700">Deterministic local benchmark</text>
  <text x="72" y="104" fill="#CBD5E1" font-family="ui-sans-serif, system-ui" font-size="17">grep-agent simulation vs one local-mgrep semantic search per task · 30 navigation tasks · tokens approximated as chars/4.</text>
  <g transform="translate(72 150)" font-family="ui-sans-serif, system-ui">
    <rect width="320" height="142" rx="24" fill="#0F172A" stroke="#1E293B"/>
    <text x="26" y="42" fill="#94A3B8" font-size="14" font-weight="700" letter-spacing="1.5">QUALITY</text>
    <text x="26" y="88" fill="#F8FAFC" font-size="42" font-weight="900">30/30</text>
    <text x="26" y="118" fill="#CBD5E1" font-size="16">expected-file recall at top-k 10</text>
    <rect x="230" y="38" width="58" height="58" rx="18" fill="#064E3B"/>
    <path d="M244 68L255 79L276 53" stroke="#A7F3D0" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(440 150)" font-family="ui-sans-serif, system-ui">
    <rect width="320" height="142" rx="24" fill="#0F172A" stroke="#1E293B"/>
    <text x="26" y="42" fill="#94A3B8" font-size="14" font-weight="700" letter-spacing="1.5">EFFICIENCY</text>
    <text x="26" y="88" fill="#F8FAFC" font-size="42" font-weight="900">2.00×</text>
    <text x="26" y="118" fill="#CBD5E1" font-size="16">estimated total-token reduction</text>
    <rect x="226" y="38" width="64" height="58" rx="18" fill="#164E63"/>
    <text x="242" y="75" fill="#CFFAFE" font-size="30" font-weight="900">×</text>
  </g>
  <g transform="translate(808 150)" font-family="ui-sans-serif, system-ui">
    <rect width="320" height="142" rx="24" fill="#0F172A" stroke="#1E293B"/>
    <text x="26" y="42" fill="#94A3B8" font-size="14" font-weight="700" letter-spacing="1.5">TOOL CALLS</text>
    <text x="26" y="88" fill="#F8FAFC" font-size="42" font-weight="900">30</text>
    <text x="94" y="88" fill="#64748B" font-size="30" font-weight="800">vs</text>
    <text x="148" y="88" fill="#F8FAFC" font-size="42" font-weight="900">227</text>
    <text x="26" y="118" fill="#CBD5E1" font-size="16">mgrep-agent vs grep-agent</text>
  </g>
  <g transform="translate(90 340)" font-family="ui-sans-serif, system-ui">
    <text x="0" y="0" fill="#E2E8F0" font-size="18" font-weight="800">Recall / savings by top-k</text>
    <g transform="translate(0 36)">
      <text x="0" y="18" fill="#94A3B8" font-size="14">k=5</text>
      <rect x="78" y="2" width="448" height="22" rx="11" fill="#1E293B"/>
      <rect x="78" y="2" width="418" height="22" rx="11" fill="url(#green)"/>
      <text x="548" y="19" fill="#E2E8F0" font-size="14">28/30 recall</text>
      <rect x="726" y="2" width="260" height="22" rx="11" fill="#1E293B"/>
      <rect x="726" y="2" width="260" height="22" rx="11" fill="url(#gold)"/>
      <text x="1008" y="19" fill="#E2E8F0" font-size="14">2.66×</text>
    </g>
    <g transform="translate(0 82)">
      <text x="0" y="18" fill="#94A3B8" font-size="14">k=10</text>
      <rect x="78" y="2" width="448" height="22" rx="11" fill="#1E293B"/>
      <rect x="78" y="2" width="448" height="22" rx="11" fill="url(#green)"/>
      <text x="548" y="19" fill="#E2E8F0" font-size="14">30/30 recall</text>
      <rect x="726" y="2" width="260" height="22" rx="11" fill="#1E293B"/>
      <rect x="726" y="2" width="195" height="22" rx="11" fill="url(#gold)"/>
      <text x="1008" y="19" fill="#E2E8F0" font-size="14">2.00×</text>
    </g>
    <g transform="translate(0 128)">
      <text x="0" y="18" fill="#94A3B8" font-size="14">k=20</text>
      <rect x="78" y="2" width="448" height="22" rx="11" fill="#1E293B"/>
      <rect x="78" y="2" width="448" height="22" rx="11" fill="url(#green)"/>
      <text x="548" y="19" fill="#E2E8F0" font-size="14">30/30 recall</text>
      <rect x="726" y="2" width="260" height="22" rx="11" fill="#1E293B"/>
      <rect x="726" y="2" width="133" height="22" rx="11" fill="url(#gold)"/>
      <text x="1008" y="19" fill="#E2E8F0" font-size="14">1.36×</text>
    </g>
  </g>
  <text x="72" y="526" fill="#94A3B8" font-family="ui-sans-serif, system-ui" font-size="13">Note: benchmark is deterministic and local. It is not provider billing data or a full answer-quality evaluation.</text>
</svg>
