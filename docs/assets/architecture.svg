<svg width="1200" height="500" viewBox="0 0 1200 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">local-mgrep local architecture</title>
  <desc id="desc">Pipeline diagram showing local files flowing through ignore rules, tree-sitter chunking, Ollama embeddings, SQLite vector storage, hybrid ranking, diversified top-k, and JSON or answer output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#ECFEFF"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F5F9"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#0F766E"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="500" rx="30" fill="url(#bg)"/>
  <text x="72" y="68" fill="#0F172A" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">Local-first search pipeline</text>
  <text x="72" y="101" fill="#475569" font-family="ui-sans-serif, system-ui" font-size="17">Everything runs on your machine: source files, embeddings, vectors, ranking, and optional answer synthesis.</text>
  <g stroke="#0F766E" stroke-width="3" marker-end="url(#arrow)" opacity="0.9">
    <path d="M218 244H286"/>
    <path d="M426 244H494"/>
    <path d="M634 244H702"/>
    <path d="M842 244H910"/>
  </g>
  <g font-family="ui-sans-serif, system-ui" filter="url(#soft)">
    <g transform="translate(62 160)">
      <rect width="156" height="168" rx="22" fill="url(#node)" stroke="#CBD5E1"/>
      <text x="22" y="44" fill="#0F172A" font-size="19" font-weight="800">Repo files</text>
      <text x="22" y="78" fill="#475569" font-size="14">.py .ts .rs .go</text>
      <text x="22" y="102" fill="#475569" font-size="14">docs + metadata</text>
      <text x="22" y="132" fill="#0F766E" font-size="13" font-weight="700">local source only</text>
    </g>
    <g transform="translate(286 160)">
      <rect width="140" height="168" rx="22" fill="url(#node)" stroke="#CBD5E1"/>
      <text x="22" y="44" fill="#0F172A" font-size="19" font-weight="800">Hygiene</text>
      <text x="22" y="78" fill="#475569" font-size="14">.gitignore</text>
      <text x="22" y="102" fill="#475569" font-size="14">.mgrepignore</text>
      <text x="22" y="132" fill="#0F766E" font-size="13" font-weight="700">skip vendor/cache</text>
    </g>
    <g transform="translate(494 160)">
      <rect width="140" height="168" rx="22" fill="url(#node)" stroke="#CBD5E1"/>
      <text x="22" y="44" fill="#0F172A" font-size="19" font-weight="800">Chunk</text>
      <text x="22" y="78" fill="#475569" font-size="14">tree-sitter</text>
      <text x="22" y="102" fill="#475569" font-size="14">fallback text</text>
      <text x="22" y="132" fill="#0F766E" font-size="13" font-weight="700">line provenance</text>
    </g>
    <g transform="translate(702 160)">
      <rect width="140" height="168" rx="22" fill="url(#node)" stroke="#CBD5E1"/>
      <text x="22" y="44" fill="#0F172A" font-size="19" font-weight="800">Embed</text>
      <text x="22" y="78" fill="#475569" font-size="14">Ollama local</text>
      <text x="22" y="102" fill="#475569" font-size="14">batch endpoint</text>
      <text x="22" y="132" fill="#0F766E" font-size="13" font-weight="700">no API keys</text>
    </g>
    <g transform="translate(910 160)">
      <rect width="214" height="168" rx="22" fill="#0F172A" stroke="#0F766E"/>
      <text x="24" y="44" fill="#F8FAFC" font-size="19" font-weight="800">Rank + return</text>
      <text x="24" y="78" fill="#CBD5E1" font-size="14">SQLite vectors</text>
      <text x="24" y="102" fill="#CBD5E1" font-size="14">semantic + lexical</text>
      <text x="24" y="126" fill="#CBD5E1" font-size="14">diversified top-k</text>
      <text x="24" y="150" fill="#67E8F9" font-size="13" font-weight="700">JSON · snippets · answer</text>
    </g>
  </g>
  <g transform="translate(72 378)" font-family="ui-sans-serif, system-ui">
    <rect width="1056" height="54" rx="18" fill="#FFFFFF" stroke="#BAE6FD"/>
    <text x="24" y="34" fill="#0F172A" font-size="16" font-weight="700">Privacy boundary:</text>
    <text x="158" y="34" fill="#475569" font-size="16">your code never leaves the workstation unless you separately configure external tooling outside local-mgrep.</text>
  </g>
</svg>
