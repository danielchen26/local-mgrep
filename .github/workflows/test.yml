name: Tests

on:
  push:
    branches: [master]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".github/workflows/pages.yml"
      - ".github/workflows/release.yml"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ripgrep (used by the lexical prefilter)
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[rerank]"
          pip install pytest

      - name: Run unit tests
        run: pytest -q tests/
        env:
          # Tests do not need a live Ollama server — every test that
          # touches the runtime patches it. Set a non-default URL so
          # any accidental real call fails fast and visibly.
          OLLAMA_URL: http://127.0.0.1:0
