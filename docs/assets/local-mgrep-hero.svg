<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 480" role="img" aria-labelledby="hero-title hero-desc" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, system-ui, sans-serif">
  <title id="hero-title">Semantic retrieval over a local code index</title>
  <desc id="hero-desc">Conceptual diagram. Left: a 2D embedding-space scatter where each dot is a code chunk; a query vector and its top-k nearest neighbors are highlighted. Right: the corresponding ranked snippets returned by mgrep search.</desc>

  <defs>
    <marker id="hero-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1280" height="480" fill="#ffffff"/>

  <!-- ===== Left panel: embedding-space scatter ===== -->
  <g transform="translate(48 60)">
    <!-- panel frame -->
    <rect width="560" height="380" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
    <text x="20" y="28" font-size="11" font-weight="700" letter-spacing="2" fill="#475569">EMBEDDING SPACE (illustrative · 2-D projection)</text>

    <!-- axes frame (subtle) -->
    <rect x="36" y="48" width="492" height="304" fill="#ffffff" stroke="#cbd5e1" stroke-width="0.75"/>

    <!-- background scatter (chunks) - slate dots -->
    <g fill="#94a3b8">
      <circle cx="92" cy="120" r="4"/>
      <circle cx="76" cy="170" r="4"/>
      <circle cx="118" cy="92" r="4"/>
      <circle cx="148" cy="148" r="4"/>
      <circle cx="180" cy="100" r="4"/>
      <circle cx="64" cy="232" r="4"/>
      <circle cx="98" cy="276" r="4"/>
      <circle cx="146" cy="252" r="4"/>
      <circle cx="200" cy="220" r="4"/>
      <circle cx="232" cy="270" r="4"/>
      <circle cx="180" cy="320" r="4"/>
      <circle cx="120" cy="320" r="4"/>
      <circle cx="62" cy="318" r="4"/>
      <circle cx="280" cy="98" r="4"/>
      <circle cx="316" cy="138" r="4"/>
      <circle cx="252" cy="172" r="4"/>
      <circle cx="276" cy="222" r="4"/>
      <circle cx="320" cy="252" r="4"/>
      <circle cx="270" cy="306" r="4"/>
      <circle cx="332" cy="324" r="4"/>
      <circle cx="392" cy="86" r="4"/>
      <circle cx="362" cy="104" r="4"/>
      <circle cx="402" cy="178" r="4"/>
      <circle cx="448" cy="204" r="4"/>
      <circle cx="492" cy="120" r="4"/>
      <circle cx="478" cy="232" r="4"/>
      <circle cx="464" cy="296" r="4"/>
      <circle cx="424" cy="318" r="4"/>
      <circle cx="380" cy="316" r="4"/>
      <circle cx="500" cy="312" r="4"/>
    </g>

    <!-- top-k radius circle around query -->
    <circle cx="216" cy="186" r="62" fill="#0f766e" fill-opacity="0.06" stroke="#0f766e" stroke-width="1" stroke-dasharray="5 3"/>

    <!-- top-k chunks (highlighted as deep teal) -->
    <g fill="#0f766e">
      <circle cx="200" cy="220" r="5.5"/>
      <circle cx="252" cy="172" r="5.5"/>
      <circle cx="180" cy="148" r="0"/>
      <circle cx="232" cy="216" r="5.5"/>
      <circle cx="186" cy="232" r="5.5"/>
      <circle cx="248" cy="148" r="5.5"/>
    </g>

    <!-- query marker (cross) -->
    <g stroke="#0f172a" stroke-width="2.25" stroke-linecap="round">
      <line x1="208" y1="186" x2="224" y2="186"/>
      <line x1="216" y1="178" x2="216" y2="194"/>
    </g>
    <circle cx="216" cy="186" r="3.5" fill="#0f172a"/>

    <!-- annotations -->
    <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" fill="#0f172a">
      <text x="226" y="180">q  query embedding</text>
      <text x="280" y="106">·  indexed code chunk</text>
      <text x="280" y="130" fill="#0f766e">●  top-k nearest by cosine</text>
    </g>

    <!-- caption -->
    <text x="20" y="372" font-size="11" fill="#64748b">A query is embedded with the same Ollama model used at index time; cosine similarity ranks all candidates in one NumPy pass.</text>
  </g>

  <!-- arrow connecting panels -->
  <g stroke="#0f172a" stroke-width="1.25" fill="none" marker-end="url(#hero-arr)">
    <line x1="616" y1="250" x2="676" y2="250"/>
  </g>
  <text x="646" y="240" font-size="11" fill="#475569" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace">rerank · diversify</text>

  <!-- ===== Right panel: ranked results ===== -->
  <g transform="translate(688 60)">
    <rect width="544" height="380" rx="6" fill="#0f172a" stroke="#0f172a"/>
    <text x="20" y="28" font-size="11" font-weight="700" letter-spacing="2" fill="#94a3b8" font-family="ui-sans-serif, system-ui">RANKED CONTEXT (top-5)</text>

    <!-- result rows -->
    <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" fill="#e2e8f0">
      <!-- row 1 -->
      <g transform="translate(20 56)">
        <rect width="504" height="56" rx="4" fill="#1e293b" stroke="#334155"/>
        <text x="14" y="22" fill="#67e8f9">local_mgrep/src/storage.py:197-271</text>
        <text x="14" y="42" fill="#94a3b8">def search(conn, query_embedding, top_k=10, …)</text>
        <text x="490" y="22" text-anchor="end" fill="#5eead4">0.824</text>
      </g>
      <!-- row 2 -->
      <g transform="translate(20 124)">
        <rect width="504" height="56" rx="4" fill="#1e293b" stroke="#334155"/>
        <text x="14" y="22" fill="#67e8f9">local_mgrep/src/storage.py:131-153</text>
        <text x="14" y="42" fill="#94a3b8">def lexical_score(query_text, path, chunk) → float</text>
        <text x="490" y="22" text-anchor="end" fill="#5eead4">0.781</text>
      </g>
      <!-- row 3 -->
      <g transform="translate(20 192)">
        <rect width="504" height="56" rx="4" fill="#1e293b" stroke="#334155"/>
        <text x="14" y="22" fill="#67e8f9">local_mgrep/src/cli.py:105-145</text>
        <text x="14" y="42" fill="#94a3b8">@cli.command() def search_cmd(query, top, …)</text>
        <text x="490" y="22" text-anchor="end" fill="#5eead4">0.742</text>
      </g>
      <!-- row 4 -->
      <g transform="translate(20 260)">
        <rect width="504" height="56" rx="4" fill="#1e293b" stroke="#334155"/>
        <text x="14" y="22" fill="#67e8f9">local_mgrep/src/storage.py:160-179</text>
        <text x="14" y="42" fill="#94a3b8">def diversify_results(candidates, top_k, max_per_file)</text>
        <text x="490" y="22" text-anchor="end" fill="#5eead4">0.706</text>
      </g>
      <!-- row 5 -->
      <g transform="translate(20 328)">
        <rect width="504" height="40" rx="4" fill="#1e293b" stroke="#334155"/>
        <text x="14" y="26" fill="#94a3b8">… 1 more · render with --json or --answer</text>
      </g>
    </g>
  </g>
</svg>
