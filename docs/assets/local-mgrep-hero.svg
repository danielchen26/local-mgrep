      <text x="22" y="36" fill="#F8FAFC" font-family="ui-sans-serif, system-ui" font-size="29" font-weight="800">30/30</text>
      <text x="22" y="64" fill="#94A3B8" font-family="ui-sans-serif, system-ui" font-size="13">top-k 10 recall</text>
    </g>
    <g transform="translate(176 194)">
      <rect width="154" height="92" rx="18" fill="#0B1120" stroke="#1E293B"/>
      <text x="22" y="36" fill="#F8FAFC" font-family="ui-sans-serif, system-ui" font-size="29" font-weight="800">2.00×</text>
      <text x="22" y="64" fill="#94A3B8" font-family="ui-sans-serif, system-ui" font-size="13">estimated tokens</text>
    </g>
    <g transform="translate(352 194)">
      <rect width="154" height="92" rx="18" fill="#0B1120" stroke="#1E293B"/>
      <text x="22" y="36" fill="#F8FAFC" font-family="ui-sans-serif, system-ui" font-size="29" font-weight="800">0</text>
      <text x="22" y="64" fill="#94A3B8" font-family="ui-sans-serif, system-ui" font-size="13">cloud calls</text>
    </g>
