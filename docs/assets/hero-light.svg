<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 540" role="img" aria-labelledby="hero-title hero-desc" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, system-ui, sans-serif">
  <title id="hero-title">local-mgrep terminal demonstration</title>
  <desc id="hero-desc">A mock terminal window shows the command "mgrep search how does the auth token get refreshed -m 3" followed by three ranked code snippets with file path, line range, language pill, and similarity score.</desc>

  <defs>
    <radialGradient id="orb-cyl" cx="14%" cy="0%" r="55%">
      <stop offset="0%"  stop-color="rgba(8,145,178,0.10)"/>
      <stop offset="65%" stop-color="rgba(8,145,178,0)"/>
    </radialGradient>
    <radialGradient id="orb-vil" cx="86%" cy="6%" r="48%">
      <stop offset="0%"  stop-color="rgba(124,58,237,0.07)"/>
      <stop offset="65%" stop-color="rgba(124,58,237,0)"/>
    </radialGradient>
    <linearGradient id="brand-grad-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="540" fill="#fafafa"/>
  <rect width="1280" height="540" fill="url(#orb-cyl)"/>
  <rect width="1280" height="540" fill="url(#orb-vil)"/>

  <!-- ==================== Brand strip ==================== -->
  <g transform="translate(80 48)">
    <g transform="translate(0 -10)">
      <rect width="28" height="28" rx="7" fill="rgba(8,145,178,0.10)" stroke="rgba(8,145,178,0.35)"/>
      <g fill="none" stroke="#0891b2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="16" y1="16" x2="22" y2="22"/>
      </g>
    </g>
    <text x="40" y="6" font-size="15" font-weight="700" fill="url(#brand-grad-l)" font-family="ui-monospace, Menlo, Consolas, monospace" letter-spacing="-0.01em">local-mgrep</text>
    <text x="160" y="6" font-size="11.5" fill="#71717a" font-family="ui-monospace, Menlo, Consolas, monospace">v0.2.0 · MIT</text>
    <text x="1120" y="6" text-anchor="end" font-size="12" fill="#52525b">Semantic code search · local SQLite vector index · powered by Ollama</text>
  </g>

  <!-- ==================== Terminal card ==================== -->
  <g transform="translate(80 92)">
    <rect width="1120" height="412" rx="14" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>

    <!-- Chrome bar -->
    <rect width="1120" height="40" rx="14" fill="#f4f4f5"/>
    <rect y="32" width="1120" height="8" fill="#f4f4f5"/>
    <line x1="0" y1="40" x2="1120" y2="40" stroke="#e5e7eb"/>
    <g transform="translate(20 20)">
      <circle cx="0"  cy="0" r="6" fill="#d4d4d8"/>
      <circle cx="20" cy="0" r="6" fill="#d4d4d8"/>
      <circle cx="40" cy="0" r="6" fill="#d4d4d8"/>
    </g>
    <text x="560" y="25" text-anchor="middle" font-size="11.5" fill="#71717a" font-family="ui-monospace, Menlo, Consolas, monospace">~/projects/api · zsh</text>

    <!-- Body -->
    <g transform="translate(28 72)" font-family="ui-monospace, Menlo, Consolas, monospace">
      <!-- Command line -->
      <text font-size="14" fill="#71717a">$</text>
      <text x="20"  font-size="14" fill="#18181b">mgrep search </text>
      <text x="160" font-size="14" fill="#0e7490">"how does the auth token get refreshed?"</text>
      <text x="568" font-size="14" fill="#71717a"> -m 3</text>

      <!-- Result 1 -->
      <g transform="translate(0 36)">
        <rect width="1064" height="92" rx="8" fill="#fafafa" stroke="#e5e7eb"/>
        <text x="16" y="24" font-size="12.5" fill="#0891b2">auth/refresh.py</text>
        <text x="138" y="24" font-size="12.5" fill="#71717a">:34-51</text>
        <rect x="936" y="11" width="56" height="20" rx="5" fill="rgba(8,145,178,0.08)" stroke="rgba(8,145,178,0.25)"/>
        <text x="964" y="25" text-anchor="middle" font-size="11" fill="#0e7490">python</text>
        <text x="1004" y="24" font-size="12" fill="#71717a">·</text>
        <text x="1018" y="24" font-size="12.5" fill="#059669" font-weight="700">0.93</text>
        <text x="16" y="48" font-size="12.5" fill="#27272a">def <tspan fill="#0891b2">refresh_token</tspan>(refresh_jwt: <tspan fill="#a16207">str</tspan>) -&gt; <tspan fill="#a16207">AccessToken</tspan>:</text>
        <text x="16" y="66" font-size="12.5" fill="#52525b">    claims = jwt.decode(refresh_jwt, key, algorithms=ALGS)</text>
        <text x="16" y="82" font-size="12.5" fill="#52525b">    if claims[<tspan fill="#15803d">"typ"</tspan>] != <tspan fill="#15803d">"refresh"</tspan>: raise InvalidToken</text>
      </g>

      <!-- Result 2 -->
      <g transform="translate(0 144)">
        <rect width="1064" height="92" rx="8" fill="#fafafa" stroke="#e5e7eb"/>
        <text x="16" y="24" font-size="12.5" fill="#0891b2">auth/middleware.py</text>
        <text x="166" y="24" font-size="12.5" fill="#71717a">:78-94</text>
        <rect x="936" y="11" width="56" height="20" rx="5" fill="rgba(8,145,178,0.08)" stroke="rgba(8,145,178,0.25)"/>
        <text x="964" y="25" text-anchor="middle" font-size="11" fill="#0e7490">python</text>
        <text x="1004" y="24" font-size="12" fill="#71717a">·</text>
        <text x="1018" y="24" font-size="12.5" fill="#059669" font-weight="700">0.81</text>
        <text x="16" y="48" font-size="12.5" fill="#27272a">async def <tspan fill="#0891b2">renew_session</tspan>(req: <tspan fill="#a16207">Request</tspan>) -&gt; <tspan fill="#a16207">Response</tspan>:</text>
        <text x="16" y="66" font-size="12.5" fill="#52525b">    if req.cookies.get(<tspan fill="#15803d">"rt"</tspan>) and access_expired(req):</text>
        <text x="16" y="82" font-size="12.5" fill="#52525b">        return await refresh_token(req.cookies[<tspan fill="#15803d">"rt"</tspan>])</text>
      </g>

      <!-- Result 3 -->
      <g transform="translate(0 252)">
        <rect width="1064" height="92" rx="8" fill="#fafafa" stroke="#e5e7eb"/>
        <text x="16" y="24" font-size="12.5" fill="#0891b2">utils/jwt.py</text>
        <text x="100" y="24" font-size="12.5" fill="#71717a">:22-39</text>
        <rect x="936" y="11" width="56" height="20" rx="5" fill="rgba(8,145,178,0.08)" stroke="rgba(8,145,178,0.25)"/>
        <text x="964" y="25" text-anchor="middle" font-size="11" fill="#0e7490">python</text>
        <text x="1004" y="24" font-size="12" fill="#71717a">·</text>
        <text x="1018" y="24" font-size="12.5" fill="#059669" font-weight="700">0.74</text>
        <text x="16" y="48" font-size="12.5" fill="#27272a">def <tspan fill="#0891b2">decode_jwt</tspan>(token: <tspan fill="#a16207">str</tspan>, *, verify: <tspan fill="#a16207">bool</tspan> = <tspan fill="#b45309">True</tspan>) -&gt; <tspan fill="#a16207">dict</tspan>:</text>
        <text x="16" y="66" font-size="12.5" fill="#52525b">    parts = token.split(<tspan fill="#15803d">"."</tspan>)</text>
        <text x="16" y="82" font-size="12.5" fill="#52525b">    if len(parts) != 3: raise InvalidToken(<tspan fill="#15803d">"malformed"</tspan>)</text>
      </g>
    </g>
  </g>
</svg>
