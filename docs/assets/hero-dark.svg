<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 600" role="img" aria-labelledby="hero-title hero-desc" font-family="Inter, ui-sans-serif, -apple-system, 'Segoe UI', Roboto, system-ui, sans-serif">
  <title id="hero-title">local-mgrep — semantic code search over a local index</title>
  <desc id="hero-desc">Brand block with the local-mgrep wordmark and tagline sitting above a mock terminal window that shows the command "mgrep search how does the auth token get refreshed -m 3" followed by three ranked code snippets with file path, line range, language pill, and similarity score.</desc>

  <defs>
    <radialGradient id="orb-cy" cx="14%" cy="0%" r="58%">
      <stop offset="0%"  stop-color="rgba(34,211,238,0.22)"/>
      <stop offset="65%" stop-color="rgba(34,211,238,0)"/>
    </radialGradient>
    <radialGradient id="orb-vi" cx="86%" cy="6%" r="50%">
      <stop offset="0%"  stop-color="rgba(167,139,250,0.16)"/>
      <stop offset="65%" stop-color="rgba(167,139,250,0)"/>
    </radialGradient>
    <radialGradient id="orb-em" cx="50%" cy="100%" r="40%">
      <stop offset="0%"  stop-color="rgba(34,211,238,0.10)"/>
      <stop offset="70%" stop-color="rgba(34,211,238,0)"/>
    </radialGradient>
    <linearGradient id="brand-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="600" fill="#0a0d12"/>
  <rect width="1280" height="600" fill="url(#orb-cy)"/>
  <rect width="1280" height="600" fill="url(#orb-vi)"/>
  <rect width="1280" height="600" fill="url(#orb-em)"/>

  <!-- =================== Brand block =================== -->
  <!-- Search-glass mark, centered above wordmark -->
  <g transform="translate(602 44)">
    <rect width="36" height="36" rx="9" fill="rgba(34,211,238,0.12)" stroke="rgba(34,211,238,0.35)"/>
    <g fill="none" stroke="#67e8f9" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" transform="translate(2 2)">
      <circle cx="14" cy="14" r="6"/>
      <line x1="19" y1="19" x2="27" y2="27"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="640" y="125" text-anchor="middle" font-size="48" font-weight="700" fill="url(#brand-grad)" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" letter-spacing="-0.025em">local-mgrep</text>

  <!-- Subtitle -->
  <text x="640" y="156" text-anchor="middle" font-size="16" fill="#a1a1aa">Semantic code search over a local index — fully offline.</text>

  <!-- Pill row -->
  <g font-size="11.5" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#71717a" text-anchor="middle">
    <text x="640" y="186"><tspan fill="#22d3ee">v0.2.0</tspan>  ·  MIT  ·  Python 3.9+  ·  powered by Ollama</text>
  </g>

  <!-- =================== Terminal card =================== -->
  <g transform="translate(80 220)">
    <rect width="1120" height="358" rx="14" fill="#0f131a" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

    <!-- Chrome bar -->
    <rect width="1120" height="40" rx="14" fill="rgba(255,255,255,0.025)"/>
    <rect y="32" width="1120" height="8" fill="rgba(255,255,255,0.025)"/>
    <line x1="0" y1="40" x2="1120" y2="40" stroke="rgba(255,255,255,0.08)"/>
    <g transform="translate(20 20)">
      <circle cx="0"  cy="0" r="6" fill="#3f4759"/>
      <circle cx="20" cy="0" r="6" fill="#3f4759"/>
      <circle cx="40" cy="0" r="6" fill="#3f4759"/>
    </g>
    <text x="560" y="25" text-anchor="middle" font-size="11.5" fill="#71717a" font-family="ui-monospace, Menlo, Consolas, monospace">~/projects/api · zsh</text>

    <!-- Body -->
    <g transform="translate(28 64)" font-family="ui-monospace, Menlo, Consolas, monospace">
      <!-- Command line -->
      <text font-size="14" fill="#71717a">$</text>
      <text x="20"  font-size="14" fill="#e4e4e7">mgrep search </text>
      <text x="160" font-size="14" fill="#a5f3fc">"how does the auth token get refreshed?"</text>
      <text x="568" font-size="14" fill="#71717a"> -m 3</text>

      <!-- Result 1 -->
      <g transform="translate(0 28)">
        <rect width="1064" height="80" rx="8" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.07)"/>
        <text x="16" y="22" font-size="12.5" fill="#67e8f9">auth/refresh.py</text>
        <text x="138" y="22" font-size="12.5" fill="#71717a">:34-51</text>
        <rect x="936" y="9" width="56" height="20" rx="5" fill="rgba(34,211,238,0.10)" stroke="rgba(34,211,238,0.30)"/>
        <text x="964" y="23" text-anchor="middle" font-size="11" fill="#67e8f9">python</text>
        <text x="1004" y="22" font-size="12" fill="#71717a">·</text>
        <text x="1018" y="22" font-size="12.5" fill="#34d399" font-weight="700">0.93</text>
        <text x="16" y="44" font-size="12.5" fill="#d4d4d8">def <tspan fill="#a5f3fc">refresh_token</tspan>(refresh_jwt: <tspan fill="#fde68a">str</tspan>) -&gt; <tspan fill="#fde68a">AccessToken</tspan>:</text>
        <text x="16" y="62" font-size="12.5" fill="#a1a1aa">    claims = jwt.decode(refresh_jwt, key, algorithms=ALGS)</text>
      </g>

      <!-- Result 2 -->
      <g transform="translate(0 124)">
        <rect width="1064" height="80" rx="8" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.07)"/>
        <text x="16" y="22" font-size="12.5" fill="#67e8f9">auth/middleware.py</text>
        <text x="166" y="22" font-size="12.5" fill="#71717a">:78-94</text>
        <rect x="936" y="9" width="56" height="20" rx="5" fill="rgba(34,211,238,0.10)" stroke="rgba(34,211,238,0.30)"/>
        <text x="964" y="23" text-anchor="middle" font-size="11" fill="#67e8f9">python</text>
        <text x="1004" y="22" font-size="12" fill="#71717a">·</text>
        <text x="1018" y="22" font-size="12.5" fill="#34d399" font-weight="700">0.81</text>
        <text x="16" y="44" font-size="12.5" fill="#d4d4d8">async def <tspan fill="#a5f3fc">renew_session</tspan>(req: <tspan fill="#fde68a">Request</tspan>) -&gt; <tspan fill="#fde68a">Response</tspan>:</text>
        <text x="16" y="62" font-size="12.5" fill="#a1a1aa">    if req.cookies.get(<tspan fill="#86efac">"rt"</tspan>) and access_expired(req):</text>
      </g>

      <!-- Result 3 -->
      <g transform="translate(0 220)">
        <rect width="1064" height="80" rx="8" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.07)"/>
        <text x="16" y="22" font-size="12.5" fill="#67e8f9">utils/jwt.py</text>
        <text x="100" y="22" font-size="12.5" fill="#71717a">:22-39</text>
        <rect x="936" y="9" width="56" height="20" rx="5" fill="rgba(34,211,238,0.10)" stroke="rgba(34,211,238,0.30)"/>
        <text x="964" y="23" text-anchor="middle" font-size="11" fill="#67e8f9">python</text>
        <text x="1004" y="22" font-size="12" fill="#71717a">·</text>
        <text x="1018" y="22" font-size="12.5" fill="#34d399" font-weight="700">0.74</text>
        <text x="16" y="44" font-size="12.5" fill="#d4d4d8">def <tspan fill="#a5f3fc">decode_jwt</tspan>(token: <tspan fill="#fde68a">str</tspan>, *, verify: <tspan fill="#fde68a">bool</tspan> = <tspan fill="#fbbf24">True</tspan>) -&gt; <tspan fill="#fde68a">dict</tspan>:</text>
        <text x="16" y="62" font-size="12.5" fill="#a1a1aa">    parts = token.split(<tspan fill="#86efac">"."</tspan>)</text>
      </g>
    </g>
  </g>
</svg>
