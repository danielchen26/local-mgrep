<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">local-mgrep hero graphic</title>
  <desc id="desc">A polished dark hero graphic showing local semantic code search powered by Ollama, SQLite, hybrid ranking, and agent-ready output.</desc>
  <defs>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(252 113) rotate(42) scale(620 350)">
      <stop stop-color="#37F7C4" stop-opacity="0.58"/>
      <stop offset="0.48" stop-color="#377DFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1030 442) rotate(-148) scale(560 300)">
      <stop stop-color="#F7C948" stop-opacity="0.38"/>
      <stop offset="0.52" stop-color="#37F7C4" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="113" y1="80" x2="1058" y2="484" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="stroke" x1="102" y1="55" x2="1099" y2="489" gradientUnits="userSpaceOnUse">
