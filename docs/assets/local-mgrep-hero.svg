      <stop offset="0.42" stop-color="#34D399" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#FDE68A" stop-opacity="0.42"/>
    </linearGradient>
    <filter id="shadow" x="45" y="38" width="1110" height="474" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="30" stdDeviation="34" flood-color="#000" flood-opacity="0.48"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="38" fill="#020617"/>
  <rect width="1200" height="520" rx="38" fill="url(#glowA)"/>
  <rect width="1200" height="520" rx="38" fill="url(#glowB)"/>
  <g opacity="0.18">
    <path d="M0 96H1200M0 192H1200M0 288H1200M0 384H1200" stroke="#94A3B8"/>
    <path d="M120 0V520M240 0V520M360 0V520M480 0V520M600 0V520M720 0V520M840 0V520M960 0V520M1080 0V520" stroke="#94A3B8"/>
  </g>
  <rect x="70" y="58" width="1060" height="404" rx="34" fill="url(#card)" filter="url(#shadow)"/>
  <rect x="70.75" y="58.75" width="1058.5" height="402.5" rx="33.25" stroke="url(#stroke)" stroke-width="1.5"/>
  <g transform="translate(108 104)">
